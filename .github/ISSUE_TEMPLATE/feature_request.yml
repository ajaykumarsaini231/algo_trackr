name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today, or what is painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen instead? UI sketch, API shape, or behavior description all welcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Learning / progression
        - Questions / search
        - Statistics / analytics
        - Reminders / WhatsApp
        - Admin console
        - Auth / accounts
        - Performance / infrastructure
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and the roadmap in README/docs/FEATURES.md
          required: true
